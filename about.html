  en: {
    title: 'About testpop',
    body: `

      <p><a href="index.html" style="color:#7C8AED;font-weight:700">→ Take a test</a></p>`,
    footer: ['About','Privacy Policy','Contact']
  },
  ja: {
    title: 'testpopについて',
    body: `
      <p style="margin-bottom:14px"><strong>testpop</strong>は、誰でも10秒で楽しめる気軽な心理テストを集めた場所です。</p>
      <p style="margin-bottom:14px">毎日の行動の中に隠れた自分の傾向を、かわいいキャラクターの結果でお届けします。LINEの返信スタイルから消費習慣まで — 簡単な質問で新しい自分を発見し、友達と一緒に笑い合えます。</p>
      <p style="margin-bottom:14px">すべてのテストは結果をカード画像にしてLINE・Instagramなどでシェアでき、韓国語・英語・日本語・中国語に対応しています。</p>
      <p style="margin-bottom:14px">testpopのコンテンツはすべて医学的・心理学的診断ではなく、<strong>楽しみとエンターテインメント</strong>のためのものです。新しいテストが順次追加されます。</p>

    footer: ['サイト紹介','プライバシーポリシー','お問い合わせ']
  },
  zh: {
    title: '关于 testpop',
    body: `
      <p style="margin-bottom:14px"><strong>testpop</strong> 是一个汇集了各种轻松心理测试的地方，任何人都能在10秒内开始体验。</p>
      <p style="margin-bottom:14px">我们用可爱的角色结果揭示隐藏在你日常行为中的性格倾向。从聊天回复风格到消费习惯 — 通过几个简单的问题重新认识自己，与朋友分享结果，一起开心大笑。</p>
      <p style="margin-bottom:14px">所有测试都能将结果制作成卡片图片，可直接分享到微信、Instagram等平台，支持韩语、英语、日语、中文。</p>
      <p style="margin-bottom:14px">testpop的所有内容仅供<strong>娱乐和趣味</strong>，不构成医学或心理学诊断。新测试将持续更新。</p>
      <p><a href="index.html" style="color:#7C8AED;font-weight:700">→ 去做测试</a></p>`,
    footer: ['关于我们','隐私政策','联系我们']
  }
};

const footerLinks = ['about.html','privacy.html','contact.html'];

function getLang() {
  return localStorage.getItem('lang') || navigator.language.slice(0,2) || 'ko';
}

function render(l) {
  if (!T[l]) l = 'ko';
  document.documentElement.lang = l;
  const t = T[l];
  document.getElementById('content').innerHTML =
    `<h1 style="font-family:Jua,sans-serif;font-size:1.6rem;margin-bottom:16px">${t.title}</h1>${t.body}`;
  document.getElementById('footerNav').innerHTML =
    t.footer.map((name,i) => `<a href="${footerLinks[i]}">${name}</a>`).join('');
  document.querySelectorAll('#langSel button').forEach(b => {
    b.style.fontWeight = b.dataset.l === l ? '700' : '400';
    b.style.color = b.dataset.l === l ? '#7C8AED' : '';
  });
}

document.querySelectorAll('#langSel button').forEach(b => {
  b.addEventListener('click', () => {
    localStorage.setItem('lang', b.dataset.l);
    render(b.dataset.l);
  });
});

render(getLang());
</script>
