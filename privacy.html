const footerLinks = ['about.html','privacy.html','contact.html'];

function getLang() {
  return localStorage.getItem('testpop_lang') || navigator.language.slice(0,2) || 'ko';
}

function render(l) {
  if (!T[l]) l = 'ko';
  document.documentElement.lang = l;
  const t = T[l];
  document.getElementById('content').innerHTML =
    `<h1 style="font-family:Jua,sans-serif;font-size:1.6rem;margin-bottom:16px">${t.title}</h1>` +
    p(`<strong>${t.updated}</strong>`) + p(t.intro) +
    h2(t.s1t) + p(t.s1) +
    h2(t.s2t) + p(t.s2) +
    h2(t.s3t) + p(t.s3) +
    h2(t.s4t) + p(t.s4) +
    h2(t.s5t) + p(t.s5);
  document.getElementById('footerNav').innerHTML =
    t.footer.map((name,i) => `<a href="${footerLinks[i]}">${name}</a>`).join('');
  document.querySelectorAll('#langSel button').forEach(b => {
    b.style.fontWeight = b.dataset.l === l ? '700' : '400';
    b.style.color = b.dataset.l === l ? '#7C8AED' : '';
  });
}

document.querySelectorAll('#langSel button').forEach(b => {
  b.addEventListener('click', () => {
    localStorage.setItem('testpop_lang', b.dataset.l);
    render(b.dataset.l);
  });
});

render(getLang());
</script>
