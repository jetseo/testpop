    faqTitle: '자주 묻는 질문',
    faq1q: '테스트 결과가 마음에 안 들면 다시 할 수 있나요?',
    faq1a: '네, 언제든지 처음부터 다시 테스트할 수 있습니다. 결과 화면 하단의 다시하기 버튼을 누르거나 페이지를 새로고침하면 됩니다.',
    faq2q: '결과 이미지를 저장하려면 어떻게 하나요?',
    faq2a: '결과 화면에서 카드 만들기 버튼을 누르면 이미지가 생성됩니다. 길게 누르거나 저장 버튼을 눌러 갤러리에 저장할 수 있습니다.',
    faq3q: '새로운 테스트는 언제 추가되나요?',
    faq3a: '새로운 테스트를 꾸준히 준비하고 있습니다. 원하시는 테스트 주제가 있다면 문의를 통해 제안해 주세요!',
    footer: ['소개','개인정보처리방침','문의']
  },
  en: {
    title: 'Contact',
    intro: 'We welcome bug reports, new test suggestions, partnership and advertising inquiries.',
    detail: 'testpop is always looking for your feedback to make our tests more fun and diverse. Feel free to send us anything — test topics you want, unexpected results, translation errors, or anything inconvenient while using the site.',
    qrLabel: '💬 Contact us on KakaoTalk',
    qrSub: 'Scan the QR code or search for our open profile on KakaoTalk',
    outro: 'We review all messages and reply in order. If you spot a typo or translation error, please let us know along with the test name and we\'ll fix it quickly.',
    faqTitle: 'Frequently Asked Questions',
    faq1q: 'Can I retake a test if I don\'t like my result?',
    faq1a: 'Yes, you can retake any test anytime. Just tap the retake button at the bottom of the results page, or refresh the page.',
    faq2q: 'How do I save my result image?',
    faq2a: 'Tap the "Create Card" button on the results screen to generate your image. Then long-press or tap save to store it in your gallery.',
    faq3q: 'When are new tests added?',
    faq3a: 'We are constantly preparing new tests. If you have a topic in mind, feel free to suggest it!',
    footer: ['About','Privacy Policy','Contact']
  },
  ja: {
    title: 'お問い合わせ',
    intro: 'テストのエラー報告、新しいテストの提案、提携・広告のお問い合わせを歓迎します。',
    detail: 'testpopはより楽しく多様なテストを作るため、いつでも皆さんのご意見をお待ちしています。欲しいテストのテーマ、結果がおかしかった場合、翻訳ミス、サイト利用中に不便に感じたことなど、どんな内容でもお気軽にお送りください。',
    qrLabel: '💬 カカオトークでお問い合わせ',
    qrSub: 'QRコードをスキャンするか、カカオトークでオープンプロフィールを検索してください',
    outro: 'いただいた内容は確認後、順次ご返答いたします。誤字や翻訳ミスを見つけた場合は、該当するテスト名と一緒にお知らせください。',
    faqTitle: 'よくある質問',
    faq1q: '結果が気に入らない場合、やり直せますか？',
    faq1a: 'はい、いつでも最初からやり直せます。結果画面下部のやり直しボタンを押すか、ページを更新してください。',
    faq2q: '結果画像を保存するにはどうすればいいですか？',
    faq2a: '結果画面で「カード作成」ボタンを押すと画像が生成されます。長押しまたは保存ボタンでギャラリーに保存できます。',
    faq3q: '新しいテストはいつ追加されますか？',
    faq3a: '新しいテストを順次準備しています。ご希望のテーマがあれば、お問い合わせからぜひご提案ください！',
    footer: ['サイト紹介','プライバシーポリシー','お問い合わせ']
  },
  zh: {
    title: '联系我们',
    intro: '欢迎提交测试错误报告、新测试建议以及合作和广告咨询。',
    detail: 'testpop始终期待您的反馈，以便制作更有趣、更多样的测试。无论是想要的测试主题、结果异常、翻译错误，还是使用网站时感到不便的地方，都请随时告诉我们。',
    qrLabel: '💬 通过KakaoTalk联系我们',
    qrSub: '扫描二维码或在KakaoTalk中搜索我们的公开主页',
    outro: '我们会查看所有来信并按顺序回复。如果您发现错别字或翻译错误，请告知测试名称，我们将尽快修正。',
    faqTitle: '常见问题',
    faq1q: '如果不喜欢测试结果，可以重新测试吗？',
    faq1a: '可以，随时可以重新测试。点击结果页面底部的重新开始按钮，或刷新页面即可。',
    faq2q: '如何保存结果图片？',
    faq2a: '在结果页面点击"制作卡片"按钮即可生成图片。长按或点击保存按钮可保存到相册。',
    faq3q: '新测试什么时候添加？',
    faq3a: '我们正在持续准备新测试。如果您有想要的测试主题，欢迎通过联系页面提出建议！',
    footer: ['关于我们','隐私政策','联系我们']
  }
};

const footerLinks = ['about.html','privacy.html','contact.html'];

function getLang() {
  return localStorage.getItem('lang') || navigator.language.slice(0,2) || 'ko';
}

function render(l) {
  if (!T[l]) l = 'ko';
  document.documentElement.lang = l;
  const t = T[l];
  document.getElementById('content').innerHTML =
    `<h1 style="font-family:Jua,sans-serif;font-size:1.6rem;margin-bottom:16px">${t.title}</h1>
     <p style="margin-bottom:14px">${t.intro}</p>
     <p style="margin-bottom:14px">${t.detail}</p>
     <p style="text-align:center;margin:24px 0">
       <img src="images/kakao_qr.png" alt="KakaoTalk QR"
         style="width:180px;height:180px;border-radius:8px;display:inline-block;vertical-align:middle">
     </p>
     <p style="text-align:center;margin-bottom:8px">
       <a href="https://open.kakao.com/me/testpop" target="_blank" rel="noopener" style="background:#fee500;font-weight:700;font-size:.95rem;color:#3a1d00;padding:6px 18px;border-radius:20px;display:inline-block;text-decoration:none">${t.qrLabel}</a>
     </p>
     <p style="text-align:center;font-size:.82rem;color:#888;margin-bottom:20px">${t.qrSub}</p>
     <p style="margin-bottom:14px">${t.outro}</p>
     <h2 style="font-size:1.1rem;margin:20px 0 8px">${t.faqTitle}</h2>
     <p style="margin-bottom:10px"><strong>${t.faq1q}</strong><br>${t.faq1a}</p>
     <p style="margin-bottom:10px"><strong>${t.faq2q}</strong><br>${t.faq2a}</p>
     <p style="margin-bottom:10px"><strong>${t.faq3q}</strong><br>${t.faq3a}</p>`;
  document.getElementById('footerNav').innerHTML =
    t.footer.map((name,i) => `<a href="${footerLinks[i]}">${name}</a>`).join('');
  document.querySelectorAll('#langSel button').forEach(b => {
    b.style.fontWeight = b.dataset.l === l ? '700' : '400';
    b.style.color = b.dataset.l === l ? '#7C8AED' : '';
  });
}

document.querySelectorAll('#langSel button').forEach(b => {
  b.addEventListener('click', () => {
    localStorage.setItem('lang', b.dataset.l);
    render(b.dataset.l);
  });
});

render(getLang());
</script>
</body></html>
